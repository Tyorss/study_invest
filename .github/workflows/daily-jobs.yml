name: Daily Market Jobs

on:
  schedule:
    - cron: "10 16 * * *"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: ${{ vars.APP_BASE_URL || secrets.APP_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Validate cron config
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "APP_BASE_URL is empty. Set it in GitHub Actions Variables or Secrets."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is empty. Set it in GitHub Actions Secrets."
            exit 1
          fi

      - name: Run daily cron pipeline
        run: |
          BASE_URL="${APP_BASE_URL%/}"
          curl -fsS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/run-daily"
